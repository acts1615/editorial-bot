name: 📰 신문 사설 브리핑

on:
  schedule:
    - cron: '0 22 * * *'   # 아침 7시 KST (= 전날 22:00 UTC)
    - cron: '0 10 * * *'   # 저녁 7시 KST (= 당일 10:00 UTC)
  workflow_dispatch:        # 수동 테스트 실행

jobs:
  editorial-summary:
    name: 사설 수집 → 요약 → 이메일
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📂 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: pip install -r requirements.txt

      - name: 🚀 사설 브리핑 실행
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:       ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
